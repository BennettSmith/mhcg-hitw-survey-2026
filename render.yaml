# Blueprint: https://render.com/docs/blueprint-spec
# In the Render dashboard: New → Blueprint → connect this repo, or paste this file.
services:
  - type: web
    name: mhcg-hitw-survey-viewer
    runtime: docker
    # Use `starter` (or higher) if you want the instance to stay up without free-tier spin-down.
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: PHOTO_REMOTE_BASE_URL
        value: https://raw.githubusercontent.com/BennettSmith/mhcg-hitw-survey-2026/533d94246461cfaac1d57c10394513262fa74727/photos
      - key: PHOTO_CACHE_DIR
        value: /tmp/survey-photo-cache
      - key: NOTES_READ_ONLY
        value: "true"
