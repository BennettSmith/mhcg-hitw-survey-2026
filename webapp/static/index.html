<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Survey photos</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        --bg: #f4f2ef;
        --panel: #fff;
        --border: #d9d4cd;
        --text: #1c1b19;
        --muted: #5c5852;
        --accent: #2f6f7a;
        --accent-soft: #e8f2f3;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        flex: 0 0 auto;
        padding: 0.65rem 1rem;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
      }
      header h1 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 600;
      }
      header span {
        font-size: 0.8rem;
        color: var(--muted);
      }
      main {
        flex: 1;
        min-height: 0;
        display: flex;
      }
      #list-panel {
        width: min(380px, 38vw);
        min-width: 240px;
        border-right: 1px solid var(--border);
        background: var(--panel);
        display: flex;
        flex-direction: column;
      }
      #list-panel label[for="search"] {
        padding: 0.5rem 0.75rem 0.25rem;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      #search {
        margin: 0 0.75rem 0.5rem;
        padding: 0.45rem 0.5rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
      }
      .list-dual-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .list-section {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .list-section-photos {
        flex: 1 1 55%;
      }
      .list-section-pins {
        flex: 0 1 45%;
        max-height: 46%;
        min-height: 112px;
        border-top: 1px solid var(--border);
      }
      .list-section-label {
        flex: 0 0 auto;
        padding: 0.4rem 0.75rem 0.2rem;
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        background: #faf9f7;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-list {
        list-style: none;
        margin: 0;
        padding: 0;
        overflow-y: auto;
        flex: 1;
        min-height: 0;
      }
      .sidebar-list li button {
        width: 100%;
        text-align: left;
        border: none;
        border-bottom: 1px solid var(--border);
        background: transparent;
        padding: 0.55rem 0.75rem;
        cursor: pointer;
        font: inherit;
        color: inherit;
      }
      .sidebar-list
        li:not(.is-selected):not(.is-nearby):not(.is-selected-from-pin)
        button:hover {
        background: var(--accent-soft);
      }
      .sidebar-list li.is-selected button,
      .sidebar-list li.is-selected-from-pin button {
        background: var(--accent-soft);
        box-shadow: inset 3px 0 0 var(--accent);
      }
      .sidebar-list li.is-pin:not(.is-selected) button {
        background: #faf6f7;
      }
      .sidebar-list li.is-pin.is-selected button {
        background: #f3e8ec;
        box-shadow: inset 3px 0 0 #8b3a55;
      }
      .sidebar-list li.is-pin.is-nearby:not(.is-selected) button {
        background: #fff6e8;
        box-shadow: inset 3px 0 0 #c9a227;
      }
      .sidebar-list li.is-pin .li-meta {
        color: #6b3d4d;
      }
      /* After arrow-key navigation, suppress stray :hover until pointer moves. */
      #list-panel.list-keyboard-moved
        .sidebar-list
        li:not(.is-selected):not(.is-nearby):not(.is-selected-from-pin)
        button:hover {
        background: transparent;
      }
      .li-title {
        font-size: 0.82rem;
        font-weight: 500;
        word-break: break-all;
      }
      .li-meta {
        font-size: 0.72rem;
        color: var(--muted);
        margin-top: 0.15rem;
      }
      #detail {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        padding: 0.75rem;
        gap: 0.75rem;
      }
      #meta-block {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.65rem 0.85rem;
        font-size: 0.85rem;
        line-height: 1.45;
      }
      #meta-block dl {
        margin: 0;
        display: grid;
        grid-template-columns: 7.5rem 1fr;
        gap: 0.25rem 0.5rem;
      }
      #meta-block dt {
        margin: 0;
        color: var(--muted);
        font-weight: 500;
      }
      #meta-block dd {
        margin: 0;
        word-break: break-word;
      }
      #meta-block .lon-num {
        margin-right: 0.15rem;
      }
      #meta-block .copy-row {
        display: inline-flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
        margin-left: 0.35rem;
        vertical-align: middle;
      }
      #meta-block #copy-fmt-select {
        font: inherit;
        font-size: 0.78rem;
        padding: 0.22rem 0.4rem;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: #fff;
        color: var(--text);
        max-width: min(100%, 17rem);
      }
      #meta-block #copy-coords-btn {
        font: inherit;
        font-size: 0.78rem;
        padding: 0.22rem 0.55rem;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: #faf9f7;
        color: var(--text);
        cursor: pointer;
      }
      #meta-block #copy-coords-btn:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
      }
      #meta-block #copy-coords-btn.was-copied {
        background: #e3f2e6;
        border-color: #5a9a62;
      }
      /* Photo (left, wider share) | elevation (2/3 of maps strip) + photo map (1/3) on row 1;
         survey track spans the maps strip on row 2 (taller). */
      #visuals {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(260px, 1.65fr) minmax(0, 2fr) minmax(0, 1fr);
        grid-template-rows: minmax(115px, 0.3fr) minmax(240px, 1fr);
        gap: 0.75rem;
      }
      .photo-card {
        grid-column: 1;
        grid-row: 1 / -1;
      }
      .elevation-card {
        grid-column: 2;
        grid-row: 1;
        min-height: 0;
      }
      .elevation-wrap {
        flex: 1;
        min-height: 100px;
        max-height: 260px;
        position: relative;
        padding: 0.25rem 0.45rem 0.35rem;
        background: #faf9f7;
      }
      #elevation-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .map-photo-card {
        grid-column: 3;
        grid-row: 1;
        min-height: 0;
      }
      .map-track-card {
        grid-column: 2 / 4;
        grid-row: 2;
        min-height: 0;
      }
      @media (max-width: 900px) {
        main {
          flex-direction: column;
        }
        #list-panel {
          width: 100%;
          min-width: 0;
          max-height: 36vh;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        #visuals {
          grid-template-columns: 1fr;
          grid-template-rows: none;
        }
        .photo-card {
          grid-column: 1;
          grid-row: auto;
        }
        .elevation-card {
          grid-column: 1;
          grid-row: auto;
        }
        .map-track-card,
        .map-photo-card {
          grid-column: 1;
          grid-row: auto;
        }
        .map-track-card {
          min-height: 260px;
        }
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .card h2 {
        margin: 0;
        padding: 0.45rem 0.65rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        background: #faf9f7;
      }
      .card h2.map-card-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .map-card-actions {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }
      .map-card-title button {
        font: inherit;
        font-size: 0.66rem;
        line-height: 1.1;
        text-transform: none;
        letter-spacing: normal;
        padding: 0.16rem 0.42rem;
        border: 1px solid #dedad3;
        border-radius: 5px;
        background: #fdfcfb;
        color: #55504a;
        cursor: pointer;
      }
      .map-card-title button:hover {
        background: #f3f1ee;
        border-color: #cfc8be;
      }
      #photo-wrap {
        flex: 1;
        min-height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #eae8e4;
        position: relative;
      }
      #photo-wrap.pin-mode #photo {
        visibility: hidden;
        position: absolute;
        width: 0;
        height: 0;
      }
      .photo-pin-placeholder {
        display: none;
        padding: 1rem 1.25rem;
        text-align: center;
        max-width: 22rem;
      }
      #photo-wrap.pin-mode .photo-pin-placeholder {
        display: block;
      }
      .photo-pin-placeholder .pin-label {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 0 0 0.35rem;
      }
      .photo-pin-placeholder .pin-name {
        margin: 0 0 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
        line-height: 1.35;
      }
      .photo-pin-placeholder .pin-hint {
        margin: 0;
        font-size: 0.8rem;
        color: var(--muted);
        line-height: 1.4;
      }
      #photo {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        cursor: zoom-in;
      }
      #photo-loading {
        position: absolute;
        inset: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1rem;
        border-radius: 8px;
        background: rgba(250, 249, 247, 0.92);
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.4;
      }
      #photo-loading[hidden] {
        display: none;
      }
      #photo-error {
        position: absolute;
        inset: auto 1rem 1rem;
        padding: 0.65rem 0.75rem;
        border: 1px solid #d6a55f;
        border-radius: 6px;
        background: #fff7e8;
        color: #4c3520;
        font-size: 0.82rem;
        line-height: 1.35;
      }
      .photo-notes-section {
        flex: 0 0 auto;
        border-top: 1px solid var(--border);
        padding: 0.5rem 0.65rem 0.55rem;
        background: #faf9f7;
      }
      .photo-notes-section label {
        display: block;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      #photo-notes {
        width: 100%;
        min-height: 4.5rem;
        max-height: 12rem;
        resize: vertical;
        font: inherit;
        font-size: 0.82rem;
        line-height: 1.35;
        padding: 0.4rem 0.5rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        box-sizing: border-box;
      }
      #photo-notes:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      #photo-notes[readonly] {
        background: #f3f1ee;
        color: var(--muted);
        cursor: default;
      }
      .notes-status {
        font-size: 0.72rem;
        min-height: 1.15em;
        color: var(--muted);
        margin-top: 0.3rem;
      }
      .notes-status.ok {
        color: #2d6b36;
      }
      .notes-status.err {
        color: #9a2c2c;
      }
      .map-host {
        flex: 1;
        min-height: 220px;
      }
      .ranger-pin-icon {
        background: transparent;
        border: 0;
      }
      .ranger-pin-triangle {
        width: 0;
        height: 0;
        border-left: 9px solid transparent;
        border-right: 9px solid transparent;
        border-top: 18px solid #d71920;
        filter: drop-shadow(0 0 2px #fff) drop-shadow(0 1px 2px rgba(0, 0, 0, 0.65));
      }
      #empty {
        padding: 2rem;
        text-align: center;
        color: var(--muted);
      }
      .photo-lightbox[hidden] {
        display: none;
      }
      .photo-lightbox {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: rgba(15, 15, 15, 0.92);
        display: flex;
        align-items: stretch;
        justify-content: stretch;
      }
      .photo-lightbox-stage {
        position: relative;
        flex: 1;
        overflow: hidden;
        cursor: grab;
      }
      .photo-lightbox-stage.is-dragging {
        cursor: grabbing;
      }
      #photo-lightbox-img {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: none;
        max-height: none;
        transform-origin: center center;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }
      .photo-lightbox-toolbar {
        position: absolute;
        top: 0.7rem;
        right: 0.7rem;
        display: inline-flex;
        gap: 0.35rem;
        z-index: 2;
      }
      .photo-lightbox-toolbar button {
        font: inherit;
        font-size: 0.82rem;
        padding: 0.35rem 0.55rem;
        border: 1px solid #575757;
        border-radius: 6px;
        background: rgba(34, 34, 34, 0.9);
        color: #f4f4f4;
        cursor: pointer;
      }
      .photo-lightbox-toolbar button:hover {
        background: rgba(56, 56, 56, 0.94);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Mojave survey photos</h1>
      <span id="count-label"></span>
    </header>
    <main id="main" hidden>
      <aside id="list-panel">
        <label for="search">Filter</label>
        <input id="search" type="search" placeholder="Filename, waypoint, time…" autocomplete="off" />
        <div class="list-dual-wrap">
          <div class="list-section list-section-photos">
            <div class="list-section-label" id="list-photos-heading">Photos</div>
            <ul id="list-photos" class="sidebar-list" aria-labelledby="list-photos-heading"></ul>
          </div>
          <div class="list-section list-section-pins">
            <div class="list-section-label" id="list-pins-heading">Ranger pins</div>
            <ul id="list-pins" class="sidebar-list" aria-labelledby="list-pins-heading"></ul>
          </div>
        </div>
      </aside>
      <section id="detail">
        <div id="meta-block"></div>
        <div id="visuals">
          <div class="card photo-card">
            <h2>Photo</h2>
            <div id="photo-wrap">
              <img id="photo" alt="" />
              <div id="photo-loading" hidden>Loading photo…<br />First load may take a moment while it is fetched and cached.</div>
              <div class="photo-pin-placeholder" aria-hidden="true">
                <p class="pin-label">Ranger waypoint</p>
                <p class="pin-name" id="photo-pin-name"></p>
                <p class="pin-hint">No photo — pin from <code>track/MHCG-HITW-PINS.gpx</code>.</p>
              </div>
              <div id="photo-error" hidden></div>
            </div>
            <div class="photo-notes-section">
              <label for="photo-notes">Trail / ranger notes</label>
              <textarea
                id="photo-notes"
                rows="4"
                maxlength="16000"
                placeholder="Observations for this spot (saved to survey_photos.yaml)…"
                spellcheck="true"
              ></textarea>
              <div id="photo-notes-status" class="notes-status" aria-live="polite"></div>
            </div>
          </div>
          <div class="card elevation-card">
            <h2>Elevation profile</h2>
            <div class="elevation-wrap">
              <canvas id="elevation-canvas" aria-label="Hike elevation by distance along trail"></canvas>
            </div>
          </div>
          <div class="card map-photo-card">
            <h2 class="map-card-title">
              <span id="map-photo-title-text">Photo location</span>
              <span class="map-card-actions">
                <button type="button" id="basemap-photo-btn" aria-pressed="true">Toggle to: Topo</button>
                <button type="button" id="recenter-photo-btn">Recenter</button>
              </span>
            </h2>
            <div id="map-photo" class="map-host" role="presentation"></div>
          </div>
          <div class="card map-track-card">
            <h2 class="map-card-title">
              <span id="map-track-title-text">Survey track</span>
              <span class="map-card-actions">
                <button type="button" id="basemap-track-btn" aria-pressed="true">Toggle to: Topo</button>
                <button type="button" id="recenter-track-btn">Recenter</button>
              </span>
            </h2>
            <div id="map-track" class="map-host" role="presentation"></div>
          </div>
        </div>
      </section>
    </main>
    <div id="empty" hidden></div>
    <div id="photo-lightbox" class="photo-lightbox" hidden aria-hidden="true">
      <div class="photo-lightbox-toolbar">
        <button type="button" id="photo-lightbox-zoom-out" title="Zoom out">−</button>
        <button type="button" id="photo-lightbox-zoom-in" title="Zoom in">+</button>
        <button type="button" id="photo-lightbox-reset" title="Reset view">Reset</button>
        <button type="button" id="photo-lightbox-close" title="Close">Close</button>
      </div>
      <div id="photo-lightbox-stage" class="photo-lightbox-stage">
        <img id="photo-lightbox-img" alt="" />
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      (function () {
        const listPhotosEl = document.getElementById("list-photos");
        const listPinsEl = document.getElementById("list-pins");
        const listPanel = document.getElementById("list-panel");
        const searchEl = document.getElementById("search");
        const photoEl = document.getElementById("photo");
        const photoLoadingEl = document.getElementById("photo-loading");
        const photoErrorEl = document.getElementById("photo-error");
        const photoLightboxEl = document.getElementById("photo-lightbox");
        const photoLightboxStageEl = document.getElementById("photo-lightbox-stage");
        const photoLightboxImgEl = document.getElementById("photo-lightbox-img");
        const photoBasemapBtn = document.getElementById("basemap-photo-btn");
        const trackBasemapBtn = document.getElementById("basemap-track-btn");
        const metaEl = document.getElementById("meta-block");
        const countLabel = document.getElementById("count-label");
        const mainEl = document.getElementById("main");
        const emptyEl = document.getElementById("empty");

        const ATTRIB_OTM =
          'Map: © <a href="https://opentopomap.org">OpenTopoMap</a> ' +
          '(<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>) ' +
          '· Data: © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>';
        const ATTRIB_SAT =
          'Imagery © <a href="https://www.esri.com/">Esri</a> · Source: Esri, Maxar, Earthstar Geographics';

        const COPY_FMT_STORAGE_KEY = "mhcgHitwSurveyCopyCoordFmt";
        const COPY_FMT_OPTIONS = [
          ["decimal", "Decimal (lat, lon)"],
          ["dms", "DMS (hemisphere)"],
          ["geo", "Geo URI"],
          ["signed", "Signed compact"],
          ["tab", "Tab-separated (spreadsheet)"],
          ["lines", "Two lines (lat then lon)"],
        ];

        let photos = [];
        let pinList = [];
        let photosFiltered = [];
        let pinsFiltered = [];
        let selected = null;
        let trackCoords = [];
        let profileDist = [];
        let profileEle = [];
        let profileTotalM = 0;
        var lastElevationAlongM = null;
        let trackMap = null;
        let photoMap = null;
        let trackLine = null;
        let photoTrackLine = null;
        let trackMarker = null;
        let photoMarker = null;
        let pinMarkersLayer = null;
        let trackBaseLayers = null;
        let photoBaseLayers = null;
        let activePinIndex = null;
        const PHOTO_MAP_DEFAULT_ZOOM = 17;
        let trackBasemap = "sat";
        let photoBasemap = "sat";
        let notesReadOnly = false;
        var lightboxOpen = false;
        var lightboxBaseScale = 1;
        var lightboxScale = 1;
        var lightboxPanX = 0;
        var lightboxPanY = 0;
        var lightboxDragging = false;
        var lightboxDragStartX = 0;
        var lightboxDragStartY = 0;
        var lightboxStartPanX = 0;
        var lightboxStartPanY = 0;

        var notesDebounceTimer = null;
        var notesStatusClearTimer = null;

        function setNotesStatus(msg, isOk) {
          var el = document.getElementById("photo-notes-status");
          if (!el) {
            return;
          }
          el.textContent = msg || "";
          el.className = "notes-status";
          if (msg && isOk === true) {
            el.classList.add("ok");
          }
          if (msg && isOk === false) {
            el.classList.add("err");
          }
          if (notesStatusClearTimer) {
            clearTimeout(notesStatusClearTimer);
          }
          if (msg) {
            notesStatusClearTimer = setTimeout(function () {
              el.textContent = "";
              el.className = "notes-status";
            }, 2200);
          }
        }

        function scheduleNotesDebouncedSave() {
          if (notesDebounceTimer) {
            clearTimeout(notesDebounceTimer);
          }
          notesDebounceTimer = setTimeout(function () {
            notesDebounceTimer = null;
            void persistNotesForCurrentSelection();
          }, 650);
        }

        function persistNotesForCurrentSelection() {
          if (!selected || selected.kind !== "photo" || notesReadOnly) {
            return Promise.resolve();
          }
          var ta = document.getElementById("photo-notes");
          if (!ta) {
            return Promise.resolve();
          }
          var v = ta.value;
          var prev = selected.notes == null ? "" : String(selected.notes);
          if (v === prev) {
            return Promise.resolve();
          }

          if (!iw || !ih || !sw || !sh) {

        function decimalToDmsHemisphere(value, isLatitude) {
          var abs = Math.abs(value);
          var deg = Math.floor(abs + 1e-12);
          var minFloat = (abs - deg) * 60;
          var min = Math.floor(minFloat + 1e-12);
          var sec = (minFloat - min) * 60;
          var hemi = isLatitude
            ? value >= 0
              ? "N"
              : "S"
            : value >= 0
              ? "E"
              : "W";
          return deg + "°" + min + "'" + fmtDmsSeconds(sec) + '" ' + hemi;
        }

        function getStoredCopyFmt() {
          try {

              return v;
            }
          } catch (e) {}
          return "decimal";

        function persistCopyFmt(value) {
          try {
            if (COPY_FMT_OPTIONS.some(function (o) { return o[0] === value; })) {
              localStorage.setItem(COPY_FMT_STORAGE_KEY, value);
            }
          } catch (e) {}
        }

        function buildCopyPayload(fmt, lat, lon) {
          var la = Number(lat);
          var lo = Number(lon);
          if (!isFinite(la) || !isFinite(lo)) {
            return "";
          }
          switch (fmt) {
            case "decimal":
              return la + ", " + lo;
            case "dms":
              return decimalToDmsHemisphere(la, true) + ", " + decimalToDmsHemisphere(lo, false);
            case "geo":
              return "geo:" + la + "," + lo;
            case "signed":
              return (la >= 0 ? "+" : "") + la + (lo >= 0 ? "+" : "") + lo;
            case "tab":
              return la + "\t" + lo;
            case "lines":
              return la + "\n" + lo;
            default:
              return "";
          }
        }

        function copyToClipboard(text) {
          if (!text) {
            return Promise.reject();
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text);
          }
          return new Promise(function (resolve, reject) {
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.setAttribute("readonly", "");
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            try {
              document.execCommand("copy");
              resolve();
            } catch (err) {
              reject(err);
            } finally {
              document.body.removeChild(ta);
            }
          });
        }

        function elevationAtDistance(d) {
          if (!profileDist.length || profileDist.length !== profileEle.length) {
            return null;
          }
          if (d <= profileDist[0]) {
            return profileEle[0];
          }
          var dLast = profileDist[profileDist.length - 1];
          if (d >= dLast) {
            return profileEle[profileEle.length - 1];
          }
          for (var i = 0; i < profileDist.length - 1; i++) {
            var d0 = profileDist[i];
            var d1 = profileDist[i + 1];
            if (d >= d0 && d <= d1) {
              var t = (d - d0) / (d1 - d0 || 1e-12);
              var e0 = profileEle[i];
              var e1 = profileEle[i + 1];
              if (!isFinite(e0)) {
                e0 = e1;
              }
              if (!isFinite(e1)) {
                e1 = e0;
              }
              return e0 + t * (e1 - e0);
            }
          }
          return profileEle[0];
        }

        function closestAlongTrackM(lat, lon) {
          if (!trackCoords || trackCoords.length < 2 || !profileDist.length) {
            return 0;
          }
          var bestAlong = 0;
          var bestD2 = Infinity;
          var R = 6371000;
          var rad = Math.PI / 180;
          for (var i = 0; i < trackCoords.length - 1; i++) {
            var a = trackCoords[i];
            var b = trackCoords[i + 1];
            var d0 = profileDist[i];
            var segLen = profileDist[i + 1] - d0;
            if (segLen <= 0) {
              continue;
            }
            var lat0 = a[0];
            var lon0 = a[1];
            var bx = (b[1] - lon0) * rad * R * Math.cos(lat0 * rad);
            var by = (b[0] - lat0) * rad * R;
            var px = (lon - lon0) * rad * R * Math.cos(lat0 * rad);
            var py = (lat - lat0) * rad * R;
            var denom = bx * bx + by * by || 1e-12;
            var t = (px * bx + py * by) / denom;
            if (t < 0) {
              t = 0;
            } else if (t > 1) {
              t = 1;
            }
            var qx = bx * t;
            var qy = by * t;
            var dx = px - qx;
            var dy = py - qy;
            var d2 = dx * dx + dy * dy;
            if (d2 < bestD2) {
              bestD2 = d2;
              bestAlong = d0 + t * segLen;
            }
          }
          return bestAlong;
        }

        /** Max horizontal distance (m) from the selected item for pins on the survey map. */
        var PIN_PROXIMITY_RADIUS_M = 280;
        var rangerPinIcon = L.divIcon({
          className: "ranger-pin-icon",
          html: '<div class="ranger-pin-triangle" aria-hidden="true"></div>',
          iconSize: [18, 18],
          iconAnchor: [9, 18],
          popupAnchor: [0, -18],
        });

        function haversineMeters(lat1, lon1, lat2, lon2) {
          var R = 6371000;
          var rad = Math.PI / 180;
          var p1 = lat1 * rad;
          var p2 = lat2 * rad;
          var dphi = (lat2 - lat1) * rad;
          var dlmb = (lon2 - lon1) * rad;
          var h =
            Math.sin(dphi / 2) * Math.sin(dphi / 2) +
            Math.cos(p1) * Math.cos(p2) * Math.sin(dlmb / 2) * Math.sin(dlmb / 2);
          return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
        }

        function refreshPinsNearSelection() {

          pinMarkersLayer.clearLayers();

          if (!isFinite(rlat) || !isFinite(rlon)) {
            return;
          }
          pinList.forEach(function (w) {
            var d = haversineMeters(rlat, rlon, w.latitude, w.longitude);
            if (d <= PIN_PROXIMITY_RADIUS_M) {
              L.marker([w.latitude, w.longitude], {
                icon: rangerPinIcon,
                title: w.name || "Ranger pin",
              })

          var closestD = Infinity;
          pinsFiltered.forEach(function (w) {
            var d = haversineMeters(plat, plon, w.latitude, w.longitude);
            if (d <= PIN_PROXIMITY_RADIUS_M && d < closestD) {

        /** Nearest photo to lat/lon (filtered set when available, else full photo set). */
        function closestPhotoFilenameForCoords(lat, lon) {
          var lf = Number(lat);

          if (!isFinite(lf) || !isFinite(ln) || !candidatePhotos.length) {
            return null;
          }
          var bestName = null;
          var bestD = Infinity;
          candidatePhotos.forEach(function (p) {
            var d = haversineMeters(
              lf,
              ln,
              Number(p.latitude),
              Number(p.longitude)
            );
            if (d < bestD) {
              bestD = d;
              bestName = p.filename;
            }
          });
          return bestName;
        }

        function renderPinList() {

          var hasPhotoRef =

        /** Elevation (m) from GPX at the trail point nearest lat/lon, or null if unavailable. */
        function trailElevationMForCoords(lat, lon) {
          if (
            !trackCoords.length ||
            trackCoords.length < 2 ||
            !profileDist.length ||
            profileDist.length !== profileEle.length
          ) {
            return null;
          }
          if (!isFinite(lat) || !isFinite(lon)) {
            return null;
          }
          var d = closestAlongTrackM(lat, lon);
          var e = elevationAtDistance(d);
          if (e == null || !isFinite(e)) {
            return null;
          }
          return e;
        }

        function updateElevationForSelection(lat, lon) {
          if (
            !trackCoords.length ||
            !profileDist.length ||
            profileDist.length !== profileEle.length
          ) {
            lastElevationAlongM = null;
            drawElevationProfile(null);
            return;
          }
          var d = closestAlongTrackM(lat, lon);
          lastElevationAlongM = d;
          drawElevationProfile(d);
        }

        function drawElevationProfile(alongM) {
          var canvas = document.getElementById("elevation-canvas");
          var wrap = document.querySelector(".elevation-wrap");
          if (!canvas || !wrap) {
            return;
          }
          var w = wrap.clientWidth;
          var h = wrap.clientHeight;
          if (w < 8 || h < 8) {
            return;
          }
          var dpr = window.devicePixelRatio || 1;
          canvas.width = Math.floor(w * dpr);
          canvas.height = Math.floor(h * dpr);
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          var ctx = canvas.getContext("2d");
          if (!ctx) {
            return;
          }
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.clearRect(0, 0, w, h);
          if (!profileDist.length || profileDist.length !== profileEle.length) {
            ctx.fillStyle = "#5c5852";
            ctx.font = "12px system-ui,sans-serif";
            ctx.fillText("No GPX profile", 10, 22);
            return;
          }
          var padL = 48;
          var padR = 8;
          var padT = 6;
          var padB = 24;
          var iw = w - padL - padR;
          var ih = h - padT - padB;
          var emin = Infinity;
          var emax = -Infinity;
          var j;
          for (j = 0; j < profileEle.length; j++) {
            var ev = profileEle[j];
            if (isFinite(ev)) {
              if (ev < emin) {
                emin = ev;
              }
              if (ev > emax) {
                emax = ev;
              }
            }
          }
          if (!(emin < emax)) {
            emin -= 10;
            emax += 10;
          } else {
            var epad = (emax - emin) * 0.06 || 3;
            emin -= epad;
            emax += epad;
          }
          var dmax =
            profileTotalM > 0
              ? profileTotalM
              : profileDist[profileDist.length - 1] || 1;
          function xOf(dist) {
            return padL + (dist / dmax) * iw;
          }
          function yOf(elev) {
            return padT + ((emax - elev) / (emax - emin || 1)) * ih;
          }
          ctx.strokeStyle = "#d9d4cd";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(padL, padT);
          ctx.lineTo(padL, padT + ih);
          ctx.lineTo(padL + iw, padT + ih);
          ctx.stroke();
          ctx.strokeStyle = "#eceae6";
          ctx.lineWidth = 1;
          for (j = 1; j <= 3; j++) {
            var gy = padT + (ih * j) / 4;
            ctx.beginPath();
            ctx.moveTo(padL, gy);
            ctx.lineTo(padL + iw, gy);
            ctx.stroke();
          }
          var pts = [];
          for (j = 0; j < profileDist.length; j++) {
            if (!isFinite(profileEle[j])) {
              continue;
            }
            pts.push({
              x: xOf(profileDist[j]),
              y: yOf(profileEle[j]),
            });
          }
          if (pts.length < 2) {
            ctx.fillStyle = "#5c5852";
            ctx.font = "12px system-ui,sans-serif";
            ctx.fillText("Not enough elevation points", 10, 22);
            return;
          }
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (j = 1; j < pts.length; j++) {
            ctx.lineTo(pts[j].x, pts[j].y);
          }
          ctx.lineTo(pts[pts.length - 1].x, padT + ih);
          ctx.lineTo(pts[0].x, padT + ih);
          ctx.closePath();
          ctx.fillStyle = "rgba(47, 111, 122, 0.14)";
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (j = 1; j < pts.length; j++) {
            ctx.lineTo(pts[j].x, pts[j].y);
          }
          ctx.strokeStyle = "#2f6f7a";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = "#5c5852";
          ctx.font = "11px system-ui, sans-serif";
          ctx.textAlign = "left";
          ctx.fillText("0", padL, padT + ih + 16);
          ctx.textAlign = "right";
          ctx.fillText((dmax / 1000).toFixed(1) + " km", padL + iw, padT + ih + 16);
          ctx.textAlign = "right";
          ctx.textBaseline = "middle";
          ctx.fillText(Math.round(emax) + " m", padL - 6, padT + 8);
          ctx.fillText(Math.round(emin) + " m", padL - 6, padT + ih - 4);
          if (alongM != null && isFinite(alongM) && dmax > 0) {
            var clampD = Math.max(0, Math.min(alongM, dmax));
            var xe = xOf(clampD);
            var ee = elevationAtDistance(clampD);
            if (ee != null && isFinite(ee)) {
              var ye = yOf(ee);
              ctx.beginPath();
              ctx.strokeStyle = "rgba(232, 132, 26, 0.45)";
              ctx.lineWidth = 1;
              ctx.setLineDash([4, 3]);
              ctx.moveTo(xe, padT);
              ctx.lineTo(xe, padT + ih);
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.beginPath();
              ctx.fillStyle = "#e8841a";
              ctx.strokeStyle = "#8a4b12";
              ctx.lineWidth = 2;
              ctx.arc(xe, ye, 6, 0, Math.PI * 2);
              ctx.fill();
              ctx.stroke();
            }
          }
        }

        function ensureMaps() {
          if (trackMap && photoMap) {
            return;
          }
          destroyMaps();
          trackMap = L.map("map-track", { zoomControl: true });
          trackBaseLayers = createBaseLayers();
          setMapBasemap(trackMap, trackBaseLayers, trackBasemap);
          photoMap = L.map("map-photo", { zoomControl: true });
          photoBaseLayers = createBaseLayers();
          setMapBasemap(photoMap, photoBaseLayers, photoBasemap);

          if (trackCoords.length >= 2) {
            photoTrackLine = L.polyline(trackCoords, {
              color: "#2f6f7a",
              weight: 3,
              opacity: 0.75,
            }).addTo(photoMap);
          }

          trackMarker = L.circleMarker([0, 0], {
            radius: 9,
            color: "#8a4b12",
            weight: 2,
            fillColor: "#e8841a",
            fillOpacity: 0.95,
          }).addTo(trackMap);

          photoMarker = L.circleMarker([0, 0], {
            radius: 10,
            color: "#1c4f57",
            weight: 2,
            fillColor: "#2f6f7a",
            fillOpacity: 0.95,
          }).addTo(photoMap);

          if (trackCoords.length >= 2) {
            trackLine = L.polyline(trackCoords, {
              color: "#2f6f7a",
              weight: 4,
              opacity: 0.88,
            }).addTo(trackMap);
          }

          pinMarkersLayer = L.layerGroup().addTo(trackMap);

          if (trackCoords.length >= 2 && trackLine) {
            trackMap.fitBounds(trackLine.getBounds(), {
              padding: [28, 28],
              maxZoom: 15,
            });
          } else {
            trackMap.setView([35.08, -115.42], 12);
          }
          refreshPinsNearSelection();
        }

        async function applyFilter() {
          const q = searchEl.value.trim().toLowerCase();
          if (!q) {
            photosFiltered = photos.slice();
            pinsFiltered = pinList.slice();
          } else {
            photosFiltered = photos.filter(function (p) {
              var blob =
                String(p.filename) +
                " " +
                String(p.taken_at || "") +
                " " +
                String(p.latitude) +
                " " +
                String(p.longitude);
              return blob.toLowerCase().indexOf(q) !== -1;
            });
            pinsFiltered = pinList.filter(function (w) {
              var blob =
                String(w.name || "") +
                " " +
                String(w.taken_at || "") +
                " " +
                String(w.latitude) +
                " " +
                String(w.longitude);
              return blob.toLowerCase().indexOf(q) !== -1;
            });
          }
          if (photosFiltered.length === 0 && pinsFiltered.length === 0) {
            await persistNotesForCurrentSelection();
            selected = null;
            photoEl.removeAttribute("src");
            showPhotoLoading(false);
            showPhotoError("");
            metaEl.textContent = "No rows match the filter.";
            var notesTa = document.getElementById("photo-notes");
            if (notesTa) {
              notesTa.value = "";
            }
            setNotesStatus("", null);
            lastElevationAlongM = null;
            drawElevationProfile(null);
            destroyMaps();
            renderPhotoList();
            renderPinList();
            return;
          }
          if (selected && selected.kind === "photo") {
            var fi = photosFiltered.findIndex(function (p) {
              return p.filename === selected.filename;
            });
            if (fi >= 0) {
              await selectPhotoByIndex(fi);
              return;
            }
          }
          if (selected && selected.kind === "pin") {
            var pi = pinsFiltered.findIndex(function (w) {
              return w.pin_index === selected.pin_index;
            });
            if (pi >= 0) {
              await selectPinByIndex(pi);
              return;
            }
          }
          if (photosFiltered.length > 0) {
            await selectPhotoByIndex(0);
          } else {
            await selectPinByIndex(0);
          }
        }

        function keyboardTargetAllowsListArrows(target) {
          if (!target || !target.tagName) {
            return true;

          var tag = target.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") {
            return false;

          if (target.closest && target.closest(".leaflet-container")) {
            return false;

          return true;

        async function applySelection(sel) {
          await persistNotesForCurrentSelection();
          selected = sel;
          var p = sel;
          setPhotoPanelMode(p.kind === "pin");
          if (p.kind === "photo") {
            photoEl.alt = p.filename;
            var mediaMessage = photoMediaStatusMessage(p);
            if (mediaMessage) {
              photoEl.removeAttribute("src");
              showPhotoLoading(false);
              showPhotoError(mediaMessage);
            } else {
              showPhotoError("");
              showPhotoLoading(true);
              photoEl.removeAttribute("src");
              photoEl.src = p.media_url || "/media/" + encodeURIComponent(p.filename);
            }
          } else {
            photoEl.removeAttribute("src");
            photoEl.alt = p.name || "Waypoint";
            showPhotoLoading(false);
            showPhotoError("");
          }
          renderMeta(p);
          syncNotesFromSelection();
          ensureMaps();
          var lat = Number(p.latitude);
          var lon = Number(p.longitude);
          var ll = [lat, lon];

          trackMarker.setLatLng(ll);
          trackMarker.addTo(trackMap);
          // Keep survey-map zoom unchanged while following the current selection.
          trackMap.panTo(ll, { animate: true });

          photoMarker.setLatLng(ll);
          photoMarker.addTo(photoMap);
          photoMap.setView(ll, PHOTO_MAP_DEFAULT_ZOOM, { animate: true });

          updateElevationForSelection(lat, lon);

          renderPhotoList();
          renderPinList();
          blurListFocusIfNeeded();
          scrollSelectedListItemIntoView();
          if (p.kind === "photo") {
            scrollNearbyPinsIntoView();
          }
          requestAnimationFrame(function () {
            setTimeout(function () {
              invalidateMaps();
              refreshPinsNearSelection();
            }, 50);
          });
        }

        async function selectPhotoByIndex(i) {
          if (i < 0 || i >= photosFiltered.length) {
            return;
          }
          activePinIndex = null;
          await applySelection(wrapPhoto(photosFiltered[i]));
        }

        async function selectPinByIndex(i) {
          if (i < 0 || i >= pinsFiltered.length) {
            return;
          }
          var pin = wrapPin(pinsFiltered[i]);
          activePinIndex = pin.pin_index;
          var nearestFilename = closestPhotoFilenameForCoords(pin.latitude, pin.longitude);
          if (nearestFilename) {
            var pidx = photosFiltered.findIndex(function (p) {
              return p.filename === nearestFilename;
            });
            if (pidx >= 0) {
              await applySelection(wrapPhoto(photosFiltered[pidx]));
              return;
            }
            var pidxAll = photos.findIndex(function (p) {
              return p.filename === nearestFilename;
            });
            if (pidxAll >= 0) {
              await applySelection(wrapPhoto(photos[pidxAll]));
              return;
            }
          }
          await applySelection(pin);
        }

          if (e.key === "Escape" && lightboxOpen) {
            e.preventDefault();
            closePhotoLightbox();
            return;

          if (e.key !== "ArrowDown" && e.key !== "ArrowUp") {
            return;
          }
          if (
            mainEl.hidden ||
            (photosFiltered.length === 0 && pinsFiltered.length === 0)
          ) {

          if (!keyboardTargetAllowsListArrows(e.target)) {
            return;

          listPanel.classList.add("list-keyboard-moved");
          if (selected && selected.kind === "pin") {
            if (pinsFiltered.length === 0) {
              return;

            var pidx = pinsFiltered.findIndex(function (w) {
              return w.pin_index === selected.pin_index;
            });
            if (pidx < 0) {
              pidx = 0;
            }
            if (e.key === "ArrowDown") {
              pidx = Math.min(pinsFiltered.length - 1, pidx + 1);
            } else {
              pidx = Math.max(0, pidx - 1);
            }
            void selectPinByIndex(pidx).catch(function () {});
            return;
          }
          if (photosFiltered.length === 0) {
            return;
          }
          var idx =
            selected && selected.kind === "photo"
              ? photosFiltered.findIndex(function (p) {
                  return p.filename === selected.filename;
                })
              : 0;
          if (idx < 0) {
            idx = 0;
          }
          if (e.key === "ArrowDown") {
            idx = Math.min(photosFiltered.length - 1, idx + 1);
          } else {
            idx = Math.max(0, idx - 1);

          photoLightboxStageEl.addEventListener("pointerup", function (e) {

            if (photoLightboxStageEl.hasPointerCapture(e.pointerId)) {
              photoLightboxStageEl.releasePointerCapture(e.pointerId);

          photoLightboxStageEl.addEventListener("pointercancel", function (e) {
            if (!lightboxDragging) {

            profileTotalM =
              prof && typeof prof.total_distance_m === "number"
                ? prof.total_distance_m
                : 0;
            var nPhotos = photos.length;
            var nPins = pinList.length;
            var parts = [];
            if (nPhotos) {
              parts.push(nPhotos + " photo" + (nPhotos === 1 ? "" : "s"));

          });
        })();
      })();
