name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dev dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt

      - name: Run Python checks
        run: |
          .venv/bin/pytest --cov --cov-report=term-missing --cov-report=json
          .venv/bin/python3 scripts/check_coverage.py coverage.json

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run test:coverage

  ci:
    runs-on: ubuntu-latest
    needs:
      - python
      - frontend

    steps:
      - name: Confirm all CI jobs passed
        run: echo "Python and frontend CI jobs passed"
